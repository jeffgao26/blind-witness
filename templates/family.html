<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constant — Family View</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.4s;
    }

    body.alert-active {
      background: #5a0000;
      animation: pulse-bg 1.4s ease-in-out infinite;
    }

    @keyframes pulse-bg {
      0%,100% { background: #5a0000; }
      50%      { background: #8b0000; }
    }

    #status-card {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      transition: border-color 0.4s, background 0.4s;
    }

    body.alert-active #status-card {
      background: #3d0000;
      border-color: #ff3b3b;
    }

    #dot {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: #555;
      transition: background 0.4s;
    }
    #dot.green  { background: #30d158; box-shadow: 0 0 16px #30d15880; }
    #dot.amber  { background: #ffd60a; box-shadow: 0 0 16px #ffd60a80; }
    #dot.red    { background: #ff3b3b; box-shadow: 0 0 24px #ff3b3b; animation: pulse-dot 0.8s ease-in-out infinite; }
    #dot.gray   { background: #555; }

    @keyframes pulse-dot {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }

    #state-label {
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
    }

    #state-label.green { color: #30d158; }
    #state-label.amber { color: #ffd60a; }
    #state-label.red   { color: #ff5f5f; }

    #status-text {
      font-size: 1.55rem;
      font-weight: 600;
      color: #f5f5f5;
      margin-bottom: 4px;
    }

    #duration-text {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 20px;
    }

    #alert-note {
      display: none;
      background: #1a0000;
      border: 1px solid #ff3b3b55;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      color: #ffc8c8;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    body.alert-active #alert-note { display: block; }

    #ack-btn {
      display: none;
      padding: 10px 28px;
      border-radius: 999px;
      border: 1.5px solid #ff3b3b;
      background: transparent;
      color: #ff7070;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #ack-btn:hover { background: #ff3b3b22; }
    body.alert-active #ack-btn { display: inline-block; }

    #footer {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #444;
    }

    a { color: #555; text-decoration: none; }
    a:hover { color: #888; }
  </style>
</head>
<body>
  <div id="status-card">
    <div id="dot" class="gray"></div>
    <div id="state-label">Connecting…</div>
    <div id="status-text">—</div>
    <div id="duration-text"></div>
    <div id="alert-note"></div>
    <button id="ack-btn" onclick="acknowledge()">Silence alarm</button>
  </div>
  <div id="footer"><a href="/debug">Debug view</a></div>

  <!-- looping alarm tone (silent 1-frame MP3 fallback if context blocks audio) -->
  <audio id="alarm" loop>
    <source src="/static/alarm.wav" type="audio/wav">
  </audio>

  <script src="/static/app.js"></script>
</body>
</html>
